<svg width="300" height="300" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="150" cy="150" r="120" fill="#EFF6FF"/>
  
  <!-- Truck body -->
  <rect x="80" y="130" width="100" height="60" rx="8" fill="#2563EB"/>
  
  <!-- Truck cabin -->
  <rect x="150" y="110" width="50" height="80" rx="8" fill="#1D4ED8"/>
  
  <!-- Truck window -->
  <rect x="160" y="120" width="30" height="25" rx="4" fill="#60A5FA"/>
  
  <!-- Wheels -->
  <circle cx="110" cy="200" r="15" fill="#1E293B"/>
  <circle cx="110" cy="200" r="8" fill="#64748B"/>
  <circle cx="170" cy="200" r="15" fill="#1E293B"/>
  <circle cx="170" cy="200" r="8" fill="#64748B"/>
  
  <!-- Decorative elements -->
  <circle cx="220" cy="80" r="6" fill="#60A5FA" opacity="0.5"/>
  <circle cx="70" cy="90" r="8" fill="#60A5FA" opacity="0.3"/>
  <circle cx="200" cy="200" r="5" fill="#2563EB" opacity="0.4"/>
</svg>
