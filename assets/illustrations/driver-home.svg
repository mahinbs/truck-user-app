<svg width="240" height="180" viewBox="0 0 240 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Driver character -->
  <g transform="translate(120, 90)">
    <!-- Head -->
    <circle cx="0" cy="-30" r="25" fill="#60A5FA"/>
    
    <!-- Body -->
    <rect x="-20" y="-5" width="40" height="50" rx="8" fill="#2563EB"/>
    
    <!-- Arms -->
    <rect x="-35" y="0" width="15" height="35" rx="6" fill="#2563EB"/>
    <rect x="20" y="0" width="15" height="35" rx="6" fill="#2563EB"/>
    
    <!-- Steering wheel -->
    <circle cx="0" cy="20" r="18" fill="none" stroke="#1E293B" stroke-width="4"/>
    <circle cx="0" cy="20" r="6" fill="#1E293B"/>
    
    <!-- Face details -->
    <circle cx="-8" cy="-32" r="3" fill="#1E293B"/>
    <circle cx="8" cy="-32" r="3" fill="#1E293B"/>
    <path d="M -8 -22 Q 0 -18 8 -22" stroke="#1E293B" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Decorative road lines -->
  <rect x="20" y="140" width="40" height="6" rx="3" fill="#E2E8F0"/>
  <rect x="80" y="140" width="40" height="6" rx="3" fill="#E2E8F0"/>
  <rect x="140" y="140" width="40" height="6" rx="3" fill="#E2E8F0"/>
  
  <!-- Decorative elements -->
  <circle cx="200" cy="40" r="8" fill="#EFF6FF"/>
  <circle cx="40" cy="30" r="6" fill="#EFF6FF"/>
</svg>
